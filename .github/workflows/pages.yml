name: Deploy support pages

on:
  push:
    branches:
      - main
      - agent/mvp-implementation-readiness
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # The agent branch clause is a one-time bootstrap. Its exact marker keeps
    # unrelated branch pushes from publishing and is removed after deployment.
    if: >-
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      (github.ref == 'refs/heads/agent/mvp-implementation-readiness' &&
      contains(github.event.head_commit.message, '[pages-bootstrap]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: >-
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      (github.ref == 'refs/heads/agent/mvp-implementation-readiness' &&
      contains(github.event.head_commit.message, '[pages-bootstrap]'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
